<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us - Open World</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: #0a0a0f;
  --bg-secondary: #12121a;
  --bg-tertiary: #1a1a28;
  --border: #2a2a40;
  --border-light: #3a3a55;
  --text-primary: #e8e8f0;
  --text-secondary: #8888aa;
  --text-muted: #555570;
  --accent: #6366f1;
  --accent-hover: #818cf8;
  --success: #22c55e;
  --error: #ef4444;
  --radius: 8px;
  --radius-lg: 12px;
  --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  min-height: 100vh;
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: var(--font);
  font-size: 14px;
  -webkit-font-smoothing: antialiased;
}
.page {
  max-width: 560px;
  margin: 0 auto;
  padding: 60px 24px;
}
.back-link {
  color: var(--text-secondary);
  text-decoration: none;
  font-size: 13px;
  display: inline-block;
  margin-bottom: 32px;
  transition: color 0.15s;
}
.back-link:hover { color: var(--text-primary); }
h1 {
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 8px;
  background: linear-gradient(135deg, #fff, #818cf8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.subtitle {
  color: var(--text-secondary);
  font-size: 15px;
  margin-bottom: 36px;
  line-height: 1.5;
}
.form-group {
  margin-bottom: 20px;
}
label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 6px;
}
input, textarea {
  width: 100%;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-primary);
  font-family: var(--font);
  font-size: 14px;
  padding: 10px 14px;
  outline: none;
  transition: border-color 0.15s;
}
input:focus, textarea:focus {
  border-color: var(--accent);
}
textarea {
  min-height: 140px;
  resize: vertical;
  line-height: 1.6;
}
.btn-submit {
  width: 100%;
  padding: 12px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  font-family: var(--font);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s;
}
.btn-submit:hover { background: var(--accent-hover); }
.btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
.msg {
  margin-top: 16px;
  padding: 12px 16px;
  border-radius: var(--radius);
  font-size: 13px;
  display: none;
}
.msg-success {
  background: rgba(34, 197, 94, 0.12);
  color: var(--success);
  border: 1px solid rgba(34, 197, 94, 0.25);
}
.msg-error {
  background: rgba(239, 68, 68, 0.12);
  color: var(--error);
  border: 1px solid rgba(239, 68, 68, 0.25);
}
.email-link {
  color: var(--accent);
  text-decoration: none;
}
.email-link:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="page">
  <a href="/" class="back-link">&larr; Back to Open World</a>
  <h1>Contact Us</h1>
  <p class="subtitle">Got feedback, ideas, or questions? We'd love to hear from you.</p>

  <form id="contact-form" onsubmit="submitForm(event)">
    <div class="form-group">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" required placeholder="Your name">
    </div>
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label for="message">Message</label>
      <textarea id="message" name="message" required placeholder="What's on your mind?"></textarea>
    </div>
    <button type="submit" class="btn-submit" id="submit-btn">Send Message</button>
  </form>

  <div id="success-msg" class="msg msg-success">Thanks! Your message has been sent. We'll get back to you soon.</div>
  <div id="error-msg" class="msg msg-error"></div>
</div>

<script>
async function submitForm(e) {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  const successMsg = document.getElementById('success-msg');
  const errorMsg = document.getElementById('error-msg');
  successMsg.style.display = 'none';
  errorMsg.style.display = 'none';

  btn.disabled = true;
  btn.textContent = 'Sending...';

  try {
    const res = await fetch('/api/contact', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        message: document.getElementById('message').value,
      }),
    });
    if (!res.ok) {
      const data = await res.json();
      throw new Error(data.detail || 'Something went wrong');
    }
    successMsg.style.display = 'block';
    document.getElementById('contact-form').reset();
  } catch (err) {
    errorMsg.textContent = err.message;
    errorMsg.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Send Message';
  }
}
</script>
</body>
</html>
